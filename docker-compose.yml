services:
  db:
    image: postgres:16-alpine
    container_name: postgres-it-support
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-it_support_desk}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-it_support_desk}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: backend-it-support
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/it_support_desk?schema=public}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200}
    ports:
      - '3000:3000'

  frontend:
    build:
      context: ./frontend
    container_name: frontend-it-support
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '4200:80'

  adminer:
    image: adminer:4
    container_name: adminer-it-support
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - '8080:8080'

volumes:
  postgres_data:
